footprint: [[-0.065, -0.055], [-0.065, 0.055], [0.19, 0.055], [0.19, -0.055]]

static_layer:
  enabled: true
  map_topic: map
  unknown_cost_value: -1
  lethal_cost_threshold: 100
  first_map_only: true
  subscribe_to_updates: false
  track_unknown_space: true
  trinary_costmap: true

