TebLocalPlannerROS:

  odom_topic: odom
  map_frame: map

  #Trajectory
  teb_autosize: True #优化期间允许改变轨迹的时域长度
  dt_ref: 0.15 #局部路径规划的解析度
  dt_hysteresis: 0.03  #允许改变的时域解析度的浮动范围， 一般为 dt_ref 的 10% 左右;
  global_plan_overwrite_orientation: True  #覆盖全局路径中局部路径点的朝向
  allow_init_with_backwards_motion: True  #允许在开始时想后退来执行轨迹
  #考虑优化的全局计划子集的最大长度（累积欧几里得距离）
  #如果为0或负数：禁用；长度也受本地Costmap大小的限制
  max_global_plan_lookahead_dist: 3.0
  global_plan_viapoint_sep: 3.0  #从全局路径中选取的每两个连续通过点之间的最小间隔
  # global_plan_prune_distance: 1  #该参数决定了从机器人当前位置的后面一定距离开始裁剪
  #如果为真，规划器在速度、加速度和转弯率计算中使用精确的弧长[增加的CPU时间]，否则使用欧几里德近似。
  # exact_arc_length: False
  #在判断生成的轨迹是否冲突时使用，此时设置为3，即从轨迹起点开始逐个检查轨迹上的3个点，
  #若3个点均不发生碰撞，则认为本次轨迹有效。若小于0则检查所有路径点
  feasibility_check_no_poses: 5 #检测位姿可到达的时间间隔
  # publish_feedback: False        #发布包含完整轨迹和活动障碍物列表的规划器反馈
  force_reinit_new_goal_dist: 2.0
  force_reinit_new_goal_angular: 4.0

  # Robot
  max_vel_x: 1.0 
  max_vel_y: 0.0 
  max_vel_x_backwards: 0.8
  max_vel_theta: 0.6  #最大转向角速度 0.523rad/s
  acc_lim_x: 0.5 
  acc_lim_y: 0.0  
  acc_lim_theta: 3.0 
  max_vel_trans: 1.0


  wheelbase: 0.148 # 驱动轴和转向轴之间的距离
  # min_turning_radius: 0.296 #车类机器人的最小转弯半径
  min_turning_radius: 0.2563435195 #车类机器人的最小转弯半径

  cmd_angle_instead_rotvel: True

  footprint_model:
    # type: "polygon"
    # vertices: [[-0.075, -0.065], [-0.075, 0.065], [0.2, 0.065], [0.2, -0.065]] 
    # vertices: [[-0.065, -0.055], [-0.065, 0.055], [0.19, 0.055], [0.19, -0.055]]
    type: "line"
    line_start: [-0.02, 0.0]
    line_end: [0.135, 0.0]

  xy_goal_tolerance: 0.05  #目标 xy 偏移容忍度
  yaw_goal_tolerance: 0.25 #目标 角度 偏移容忍度
  free_goal_vel: False 

  # Obstacles
  min_obstacle_dist: 0.095 #和障碍物最小距离
  inflation_dist: 0.15 #障碍物膨胀距离
  include_costmap_obstacles: True  #costmap 中的障碍物是否被直接考虑
  costmap_obstacles_behind_robot_dist: 1.0  #default:1.5  0.0~20.0  #规划时考虑后面n米内的障碍物
  obstacle_poses_affected: 15   #障碍物姿态受影响程度0-30
  costmap_converter_plugin: ""
  costmap_converter_spin_thread: True
  costmap_converter_rate: 5
  include_dynamic_obstacles: True #是否将动态障碍物预测为速度模型
  dynamic_obstacle_inflation_dist: 0.3 #动态障碍物的膨胀范围

  # Optimization  
  no_inner_iterations: 8 #被外循环调用后内循环执行优化次数
  no_outer_iterations: 5  #执行的外循环的优化次数执行的外循环的优化次数
  optimization_activate: True #激活优化
  optimization_verbose: False #打印优化过程详情
  penalty_epsilon: 0.1 #对于硬约束近似，在惩罚函数中添加安全范围
  obstacle_cost_exponent: 4
  weight_max_vel_x: 1  
  weight_max_vel_theta: 1 
  weight_acc_lim_x: 2  
  weight_acc_lim_theta: 2  
  weight_kinematics_nh: 10000  #非完整运动学的优化权重
  weight_kinematics_forward_drive: 10  #优化过程中，迫使机器人只选择前进方向，差速轮适用
  weight_kinematics_turning_radius: 100 #优化过程中，车型机器人的最小转弯半径的权重
  weight_optimaltime: 7.5 # must be > 0 #优化过程中，基于轨迹的时间上的权重
  weight_shortest_path: 0 
  weight_obstacle: 200  #优化过程中，和障碍物最小距离的权重
  weight_inflation: 10.0    #优化过程中， 膨胀区的权重
  weight_dynamic_obstacle: 10 #优化过程中，和动态障碍物最小距离的权重
  weight_dynamic_obstacle_inflation: 0.2  #优化过程中，和动态障碍物膨胀区的权重 0~50
  weight_viapoint: 1  #优化过程中，和全局路径采样点距离的权重
  weight_adapt_factor: 2 

  # Homotopy Class Planner
  enable_homotopy_class_planning: False #激活并行规划
  enable_multithreading: True #允许多线程并行处理
  max_number_classes: 5 #考虑到的不同轨迹的最大数量
  selection_cost_hysteresis: 1.0 
  selection_prefer_initial_plan: 0.95
  selection_obst_cost_scale: 1.0
  selection_alternative_time_cost: False

  roadmap_graph_no_samples: 15  #指定为创建路线图而生成的样本数
  roadmap_graph_area_width: 5   #指定该区域的宽度
  roadmap_graph_area_length_scale: 1.0
  h_signature_prescaler: 0.5  #（0.2 < value <= 1）缩放用于区分同伦类的内部参数
  h_signature_threshold: 0.1  #如果实部和复部的差都低于规定的阈值，则假定两个h签名相等。
  obstacle_heading_threshold: 0.45  #在障碍物航向和目标航向之间指定标量乘积的值，以便将障碍物考虑在内进行探索
  switching_blocking_period: 0.0 #指定允许切换到新的等效类之前需要终止的持续时间
  #为true，则将不同拓扑的所有轨迹附加到该组通孔点，
  #否则仅将与初始/全局计划共享相同拓扑的轨迹与它们连接 (对test_optim_node无效)
  viapoints_all_candidates: True
  delete_detours_backwards: True
  max_ratio_detours_duration_best_duration: 3.0
  visualize_hc_graph: False #可视化创建的图形，用于探索不同的轨迹
  visualize_with_time_as_z_axis_scale: False  #在rviz里可看到优化使用的graph

  # Recovery
  #当规划器检测到系统异常，允许缩小时域规划范围,TEB将以更近的点作为规划目标，尝试重新规划出可行路径;
  shrink_horizon_backup: True
  shrink_horizon_min_duration: 10 #如果检测到不可行的轨迹，激活缩小的水平线后备模式，本参数为其最短持续时间。
  oscillation_recovery: True #尝试检测和解决振荡
  oscillation_v_eps: 0.1  #(0,1)内的 normalized 线速度的平均值的阈值，判断机器人是否运动异常
  oscillation_omega_eps: 0.1  #(0,1)内的 normalized 角速度的平均值，判断机器人是否运动异常
  oscillation_recovery_min_duration: 10 #在这个时间内，是否再次发生FailureDetector检测的振荡
  oscillation_filter_duration: 10 #failure_detector_中buffer容器的大小为 oscillation_filter_duration * controller_frequency
  